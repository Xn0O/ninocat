<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>游戏 - Nino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="game" data-theme="dark">
    <header class="top-nav shell">
      <a class="brand" href="./index.html">Nino</a>
      <nav aria-label="主导航">
        <a data-nav="blog" href="./blog.html">博客</a>
        <a data-nav="game" href="./game.html">游戏</a>
        <a data-nav="art" href="./art.html">美术</a>
        <a data-nav="about" href="./about.html">关于</a>
      </nav>
      <button id="theme-toggle" class="btn theme-toggle" type="button">切换主题</button>
    </header>

    <main class="shell page-main">
      <section class="page-hero">
        <img data-hero-image class="hero-image" alt="游戏头图" />
        <div class="hero-copy block">
          <p class="eyebrow">游戏</p>
          <h1>游戏卡片</h1>
          <p>默认展示全部游戏，点击分类可筛选。</p>
        </div>
      </section>

      <section class="toolbar-block block">
        <div id="game-filter" class="chip-row" aria-label="游戏分类筛选"></div>
        <button type="button" class="btn" id="random-play">随机试玩</button>
      </section>

      <section id="game-grid" class="game-grid"></section>
    </main>

    <div class="modal" id="game-modal" aria-hidden="true">
      <div class="modal-mask" data-close="1"></div>
      <section class="modal-panel">
        <header>
          <h2 id="modal-title">游戏预览</h2>
          <button type="button" class="close-btn" id="modal-close" aria-label="关闭">×</button>
        </header>
        <div class="modal-body">
          <p id="embed-hint" class="embed-hint" hidden></p>
          <a id="embed-open-link" class="btn embed-open-link" href="#" target="_blank" rel="noreferrer noopener" hidden>
            打开完整页面
          </a>
          <iframe
            id="game-frame"
            title="游戏窗口"
            allowfullscreen
            allow="fullscreen; autoplay; gamepad; clipboard-read; clipboard-write"
            referrerpolicy="strict-origin-when-cross-origin"
            loading="eager"
          ></iframe>
        </div>
      </section>
    </div>

    <footer class="site-footer shell">
      <p>Copyright © 2026 Nino</p>
      <p>All rights reserved.</p>
    </footer>

    <script src="./js/common.js"></script>
    <script src="./js/game.js"></script>
  </body>
</html>
