<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <title>博客 - Nino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="blog" data-theme="dark">
    <header class="top-nav shell">
      <a class="brand" href="./index.html">Nino</a>
      <nav aria-label="主导航">
        <a data-nav="blog" href="./blog.html">博客</a>
        <a data-nav="game" href="./game.html">游戏</a>
        <a data-nav="art" href="./art.html">美术</a>
        <a data-nav="about" href="./about.html">关于</a>
      </nav>
      <button id="theme-toggle" class="btn theme-toggle" type="button">切换主题</button>
    </header>

    <main class="shell page-main">
      <section class="page-hero">
        <img data-hero-image class="hero-image" alt="博客头图" />
        <div class="hero-copy block">
          <p class="eyebrow" data-page-hero="eyebrow">博客</p>
          <h1 data-page-hero="title">博客文章</h1>
          <p data-page-hero="description">每行一篇卡片，展示头图与摘要。</p>
        </div>
      </section>

      <section class="card-grid blog-list" id="blog-grid"></section>
      <section class="blog-pagination" id="blog-pagination" aria-label="博客分页" hidden>
        <button class="btn" id="blog-prev" type="button">上一页</button>
        <p class="blog-page-info" id="blog-page-info">第 1 / 1 页</p>
        <button class="btn" id="blog-next" type="button">下一页</button>
      </section>
    </main>

    <footer class="site-footer shell">
      <p>Copyright © 2026 Nino</p>
      <p>All rights reserved.</p>
    </footer>

    <script src="./js/common.js"></script>
    <script src="./js/blog.js"></script>
  </body>
</html>
